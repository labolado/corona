name: bgfx Build Verification

on:
  push:
    branches:
      - bgfx-solar2d
      - 'feature/**'
  pull_request:
    branches:
      - bgfx-solar2d
  workflow_dispatch:

env:
  WORKSPACE: ${{ github.workspace }}
  DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer

jobs:
  macOS-Debug:
    name: macOS Debug Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Init submodules
        run: |
          # Try normal init first, fix broken ones after
          git submodule update --init --recursive --depth 1 2>&1 || true
          # Box2D: coronalabs force-pushed, use zero-meta fork
          if [ ! -f external/Box2D/Box2D/Box2D.h ]; then
            rm -rf external/Box2D
            git clone --depth 1 https://github.com/zero-meta/submodule-box2d.git external/Box2D
          fi
          # bgfx/bx/bimg: upstream force-pushed, clone latest
          for lib in bgfx bx bimg; do
            if [ ! -d "external/$lib/include" ]; then
              rm -rf "external/$lib"
              git clone --depth 1 "https://github.com/bkaradzic/$lib.git" "external/$lib"
            fi
          done
      - name: Build rttplayer (Debug)
        run: |
          set -o pipefail
          xcodebuild -project platform/mac/ratatouille.xcodeproj \
            -target rttplayer \
            -configuration Debug \
            build \
            CODE_SIGN_IDENTITY='' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            | tail -50
      - name: Verify binary exists
        run: |
          ls -la "platform/mac/build/Debug/Corona Simulator.app/Contents/MacOS/Corona Simulator"

  macOS-Release:
    name: macOS Release Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Init submodules
        run: |
          git submodule update --init --recursive --depth 1 2>&1 || true
          if [ ! -f external/Box2D/Box2D/Box2D.h ]; then
            rm -rf external/Box2D
            git clone --depth 1 https://github.com/zero-meta/submodule-box2d.git external/Box2D
          fi
          for lib in bgfx bx bimg; do
            if [ ! -d "external/$lib/include" ]; then
              rm -rf "external/$lib"
              git clone --depth 1 "https://github.com/bkaradzic/$lib.git" "external/$lib"
            fi
          done
      - name: Build rttplayer (Release)
        run: |
          set -o pipefail
          xcodebuild -project platform/mac/ratatouille.xcodeproj \
            -target rttplayer \
            -configuration Release \
            build \
            CODE_SIGN_IDENTITY='' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            | tail -50
      - name: Verify binary exists
        run: |
          ls -la "platform/mac/build/Release/Corona Simulator.app/Contents/MacOS/Corona Simulator"

  iOS-templates:
    name: iOS Template Build (${{ matrix.target }})
    runs-on: macos-15
    strategy:
      matrix:
        target:
          - template
          - template-angle
    env:
      TEMPLATE_TARGET: ${{ matrix.target }}
      TEMPLATE_PLATFORM: iphone
    steps:
      - uses: actions/checkout@v4
      - name: Init submodules
        run: |
          git submodule update --init --recursive --depth 1 2>&1 || true
          if [ ! -f external/Box2D/Box2D/Box2D.h ]; then
            rm -rf external/Box2D
            git clone --depth 1 https://github.com/zero-meta/submodule-box2d.git external/Box2D
          fi
          for lib in bgfx bx bimg; do
            if [ ! -d "external/$lib/include" ]; then
              rm -rf "external/$lib"
              git clone --depth 1 "https://github.com/bkaradzic/$lib.git" "external/$lib"
            fi
          done
      - name: Set build env
        run: |
          {
            echo "BUILD_NUMBER=9999"
            echo "BUILD=2100.9999"
            echo "YEAR=2100"
            echo "MONTH=$(date +'%-m')"
            echo "DAY=$(date +'%-d')"
          } >> "$GITHUB_ENV"
      - name: Build iOS templates
        working-directory: ./platform/iphone
        run: |
          XCODE_SDK=$(xcrun --sdk iphoneos --show-sdk-version)
          ./build_templates.sh "$XCODE_SDK" "2100.9999"

  Android-NDK:
    name: Android NDK Compile Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Init submodules
        run: |
          git submodule update --init --recursive --depth 1 2>&1 || true
          if [ ! -f external/Box2D/Box2D/Box2D.h ]; then
            rm -rf external/Box2D
            git clone --depth 1 https://github.com/zero-meta/submodule-box2d.git external/Box2D
          fi
          for lib in bgfx bx bimg; do
            if [ ! -d "external/$lib/include" ]; then
              rm -rf "external/$lib"
              git clone --depth 1 "https://github.com/bkaradzic/$lib.git" "external/$lib"
            fi
          done
      - name: CMake configure and build
        working-directory: ./platform/android/ndk
        run: |
          mkdir -p ci-build && cd ci-build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCORONA_ROOT=${{ github.workspace }} \
            -DLuaIncludePath=${{ github.workspace }}/external/lua-5.1.3/src
          cmake --build . -j$(nproc)
