name: bgfx Build Verification

on:
  push:
    branches:
      - bgfx-solar2d
      - 'feature/**'
  pull_request:
    branches:
      - bgfx-solar2d
  workflow_dispatch:

env:
  WORKSPACE: ${{ github.workspace }}
  DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer

jobs:
  build-bgfx-libs:
    name: Build bgfx static libraries
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build bgfx (Release + Debug)
        working-directory: ./external/bgfx
        env:
          MAKEFLAGS: -j4
        run: |
          make osx-arm64
      - name: Copy libs to xcode15 dir
        run: |
          mkdir -p external/bgfx/.build/projects/xcode15
          cp external/bgfx/.build/osx-arm64/bin/lib*.a external/bgfx/.build/projects/xcode15/
      - name: Upload bgfx libs
        uses: actions/upload-artifact@v4
        with:
          name: bgfx-libs
          path: external/bgfx/.build/projects/xcode15/lib*.a

  macOS-Debug:
    name: macOS Debug Build
    needs: build-bgfx-libs
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Download bgfx libs
        uses: actions/download-artifact@v4
        with:
          name: bgfx-libs
          path: external/bgfx/.build/projects/xcode15
      - name: Build rttplayer (Debug)
        run: |
          xcodebuild -project platform/mac/ratatouille.xcodeproj \
            -target rttplayer \
            -configuration Debug \
            build \
            CODE_SIGN_IDENTITY='' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tail -80 || true
      - name: Verify binary exists
        run: |
          test -f "platform/mac/build/Debug/Corona Simulator.app/Contents/MacOS/Corona Simulator"
          echo "Debug binary verified"
      - name: Upload Debug build
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Debug
          path: platform/mac/build/Debug/Corona Simulator.app

  macOS-Release:
    name: macOS Release Build
    needs: build-bgfx-libs
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Download bgfx libs
        uses: actions/download-artifact@v4
        with:
          name: bgfx-libs
          path: external/bgfx/.build/projects/xcode15
      - name: Build rttplayer (Release)
        run: |
          xcodebuild -project platform/mac/ratatouille.xcodeproj \
            -target rttplayer \
            -configuration Release \
            build \
            CODE_SIGN_IDENTITY='' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tail -80 || true
      - name: Verify binary exists
        run: |
          test -f "platform/mac/build/Release/Corona Simulator.app/Contents/MacOS/Corona Simulator"
          echo "Release binary verified"
      - name: Upload Release build
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Release
          path: platform/mac/build/Release/Corona Simulator.app

  iOS-templates:
    name: iOS Template Build (${{ matrix.target }})
    runs-on: macos-26
    strategy:
      matrix:
        target:
          - template
          - template-angle
    env:
      TEMPLATE_TARGET: ${{ matrix.target }}
      TEMPLATE_PLATFORM: iphone
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set build env
        run: |
          {
            echo "BUILD_NUMBER=9999"
            echo "BUILD=2100.9999"
            echo "YEAR=2100"
            echo "MONTH=$(date +'%-m')"
            echo "DAY=$(date +'%-d')"
          } >> "$GITHUB_ENV"
      - name: Build iOS templates
        working-directory: ./platform/iphone
        run: |
          XCODE_SDK=$(xcrun --sdk iphoneos --show-sdk-version)
          ./build_templates.sh "$XCODE_SDK" "2100.9999"

  Android-NDK:
    name: Android NDK Compile Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: CMake configure and build
        working-directory: ./platform/android/ndk
        run: |
          mkdir -p ci-build && cd ci-build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCORONA_ROOT=${{ github.workspace }} \
            -DLuaIncludePath=${{ github.workspace }}/external/lua-5.1.3/src
          cmake --build . -j$(nproc)
